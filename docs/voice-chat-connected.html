<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .status {
            font-size: 12px;
            color: #888;
            margin-bottom: 30px;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            margin-right: 8px;
        }
        .status-dot.on { background: #fff; }
        .status-dot.listening { background: #fff; animation: pulse 0.5s infinite; }
        .status-dot.error { background: #f00; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .conversation {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
            text-align: left;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message.user { 
            background: #fff; 
            color: #000; 
            margin-left: 20%; 
        }
        .message.ai { 
            background: #222; 
            color: #ccc; 
            margin-right: 20%;
        }
        .message .label { 
            font-size: 10px; 
            opacity: 0.5; 
            margin-bottom: 3px; 
        }
        
        .mic-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #000;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .mic-button:hover {
            background: #fff;
            color: #000;
        }
        .mic-button.listening {
            background: #fff;
            color: #000;
            animation: pulse 0.5s infinite;
        }
        .mic-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .hint {
            font-size: 11px;
            color: #666;
            margin-top: 20px;
        }
        
        .error-msg {
            color: #f55;
            font-size: 12px;
            padding: 10px;
            border: 1px solid #533;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOICE CHAT</h1>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <div class="status" id="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
        
        <div class="conversation" id="conversation">
            <div class="message ai">
                <div class="label">SYSTEM</div>
                Hold the button to talk. I'll receive your message on Telegram.
            </div>
        </div>
        
        <button class="mic-button" id="micBtn">🎤</button>
        
        <div class="hint">
            Hold to talk • Release to send
        </div>
    </div>

    <script>
        (function() {
            const API_URL = 'http://localhost:3001';
            
            let isListening = false;
            let recognition = null;
            
            const micBtn = document.getElementById('micBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const conversation = document.getElementById('conversation');
            const errorMsg = document.getElementById('errorMsg');
            
            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.add('show');
                statusDot.classList.add('error');
                statusText.textContent = 'Error';
            }
            
            function checkServer() {
                fetch(API_URL + '/health')
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        statusDot.classList.add('on');
                        statusText.textContent = 'Ready';
                        micBtn.disabled = false;
                    })
                    .catch(function(e) {
                        showError('Server not running. Run: node webhook-server.js');
                    });
            }
            
            // Check Speech Recognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showError('Speech recognition not supported. Use Chrome or Edge.');
                return;
            }
            
            // Initialize
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            // Check server
            checkServer();
            
            // Recognition events
            recognition.onstart = function() {
                isListening = true;
                statusDot.classList.add('listening');
                statusText.textContent = 'Listening...';
                micBtn.classList.add('listening');
            };
            
            recognition.onend = function() {
                isListening = false;
                statusDot.classList.remove('listening');
                statusText.textContent = 'Ready';
                micBtn.classList.remove('listening');
            };
            
            recognition.onresult = function(event) {
                var result = event.results[0][0].transcript;
                if (event.results[0].isFinal) {
                    sendMessage(result);
                }
            };
            
            recognition.onerror = function(event) {
                console.error('Speech error:', event.error);
                if (event.error !== 'no-speech') {
                    showError('Error: ' + event.error);
                }
            };
            
            // Button events - hold to talk
            micBtn.addEventListener('mousedown', startListening);
            micBtn.addEventListener('mouseup', stopListening);
            micBtn.addEventListener('mouseleave', stopListening);
            micBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startListening(); });
            micBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopListening(); });
            
            function startListening() {
                if (recognition && !isListening) {
                    try {
                        recognition.start();
                    } catch(e) {}
                }
            }
            
            function stopListening() {
                if (recognition && isListening) {
                    recognition.stop();
                }
            }
            
            function addMessage(text, isUser) {
                var div = document.createElement('div');
                div.className = 'message ' + (isUser ? 'user' : 'ai');
                div.innerHTML = '<div class="label">' + (isUser ? 'YOU' : 'SYSTEM') + '</div>' + text;
                conversation.appendChild(div);
                conversation.scrollTop = conversation.scrollHeight;
            }
            
            async function sendMessage(text) {
                addMessage(text, true);
                statusDot.classList.add('listening');
                statusText.textContent = 'Sending...';
                
                try {
                    var res = await fetch(API_URL + '/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    
                    var data = await res.json();
                    
                    if (data.status === 'sent') {
                        addMessage('Message sent! Check Telegram for response.', false);
                        statusDot.classList.remove('listening');
                        statusDot.classList.add('on');
                        statusText.textContent = 'Sent';
                    }
                } catch (e) {
                    showError('Connection error');
                }
            }
        })();
    </script>
</body>
</html>
